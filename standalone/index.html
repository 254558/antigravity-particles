    /* ── 黑色圆角卡片 ── */
    .download-card {
      position: relative;
      width: min(90vw, 2944px); height: min(60vw, 1443px);
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }
    .download-card canvas {
      display: block;
      width: 100%; height: 100%;
    }
    /* ── 卡片上的文本叠加 ── */
    .card-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px;
      text-align: center;
    }
    .card-overlay h1 {
      color: #fff; font-size: clamp(20px, 3.5vw, 36px);
      font-weight: 500; letter-spacing: -0.3px;
      margin-bottom: 8px;
    }
    .card-overlay p {
      color: rgba(255,255,255,0.55);
      font-size: clamp(13px, 1.6vw, 16px);
      margin-bottom: 28px;
    }
    .card-overlay .btn {
      pointer-events: auto;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; border-radius: 8px;
      background: #fff; color: #1a1a1a;
      text-decoration: none; font-size: 15px; font-weight: 500;
      transition: transform .15s;
    }
    .card-overlay .btn:hover { transform: scale(1.04); }

    .loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: rgba(0,0,0,0.4); font-size: 14px; font-family: system-ui, sans-serif;
      pointer-events: none; z-index: 1;
    }

    /* ── 图标波浪（官网复刻）── */
    .agent-first-section {
      position: relative; margin: 20px auto 0;
      width: 100%; max-width: 1440px;
      overflow-x: clip;
      padding: 40px 0;
    }
    .icon-list {
      display: flex; flex-wrap: nowrap; gap: 8px;
      justify-content: center;
      list-style: none; margin: 20px 0 0; padding: 0;
    }
    .icon-list li { padding: 0; list-style: none; }
    .bouncer {
      background: rgba(183,191,217,0.09);
      border: 1px solid rgba(255,255,255,0.15);
      will-change: transform;
      backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Material Symbols Outlined';

    /* ── For developers / For organizations 双卡片 ── */

      margin: 20px auto 0;
      padding: 30px 0;

    .try-grid {
      display: flex; gap: 20px;
      justify-content: center;
    }
    .try-card-wrap { flex: 0 0 48%; max-width: 648px; }
    .morphing-card {
      position: relative;
      width: 100%; aspect-ratio: 648/728;
      border-radius: 28px;
      overflow: hidden;
      background: #0e0f13;
      box-shadow: 0 30px 80px rgba(0,0,0,.5);

    .morphing-card canvas.particles {

      font-size: 13px; letter-spacing: .08em; text-transform: uppercase;

      font-size: clamp(22px, 3vw, 40px);
      line-height: 1.1; font-weight: 500; letter-spacing: -.01em;
      margin-bottom: 12px; color: #fff;
    }
    .mc-desc {
      font-size: 15px; color: #b8bdc4; max-width: 420px;
      line-height: 1.5;
    }

	  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
	  <!-- 图片直接加载，无需 shape_data.js -->
	  <script type="importmap">
	  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js" } }
	  </script>

  <!-- ============ 主粒子场景（下载卡片） ============ -->
  <script type="module">
    import * as THREE from 'three';

    // ============================================================
    // 配置（对齐官网 landing-main-particles-component / light theme）
    //  官网 download card: particlesScale=0.65, ringDisplacement=0.23,
    //  density=220, ringWidth=0.15, ringWidth2=0.05
    // ============================================================
    const SIZE = 256;
    const CONFIG = {
      density: 220,              // download card override
      cameraZoom: 3.5,
      ringWidth: 0.15,
      ringWidth2: 0.05,
      ringDisplacement: 0.23,   // download card override
      particlesScale: 0.65,     // download card override
      colors: ['#4d8cff', '#4d8cff', '#4d8cff'],  // 亮蓝色
    };
    const PI = Math.PI;

    // ============================================================
    // 容器引用（卡片内的 canvas）
    // ============================================================
    const card = document.getElementById('card');

    const renderer = new THREE.WebGLRenderer({
      antialias: true, alpha: true, powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(card.offsetWidth, card.offsetHeight);
    renderer.setClearColor(0, 0);  // 透明 — 透出下方黑色卡片背景
    renderer.autoClear = false;
    card.prepend(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(40, card.offsetWidth / card.offsetHeight, 0.1, 1000);
    camera.position.z = CONFIG.cameraZoom;

    const scene = new THREE.Scene();
    scene.background = null;
    const clock = new THREE.Clock();

    // Raycast 平面
    const raycastPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(12.5, 12.5),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    scene.add(raycastPlane);
    const raycaster = new THREE.Raycaster();
    const mouseNDC = new THREE.Vector2();
    const intersectionPoint = new THREE.Vector3();
    let isIntersecting = false, mouseIsOver = false;
    let hoverProgress = 0, pushProgress = 0;
    let lastHoverState = false;

    // ============================================================
    // 泊松盘采样
    // ============================================================
    function linearMap(x, a, b, c, d) {
      return ((x - a) * (d - c)) / (b - a) + c;
    }

    function poissonDiskFixed(shape, minDist, maxDist, tries = 20) {
      const cellSize = minDist / Math.SQRT2;
      const gridW = Math.ceil(shape[0] / cellSize);
      const gridH = Math.ceil(shape[1] / cellSize);
      const grid = new Int32Array(gridW * gridH).fill(-1);
      const points = [];
      const active = [];
      const rng = Math.random;

      const gIdx = p => Math.floor(p[0] / cellSize) + Math.floor(p[1] / cellSize) * gridW;
      const far = (p, minD2) => {
        const gx = Math.floor(p[0] / cellSize), gy = Math.floor(p[1] / cellSize);
        for (let dx = -2; dx <= 2; dx++) for (let dy = -2; dy <= 2; dy++) {
          const nx = gx + dx, ny = gy + dy;
          if (nx < 0 || nx >= gridW || ny < 0 || ny >= gridH) continue;
          const pi = grid[nx + ny * gridW];
          if (pi !== -1) {
            const q = points[pi];
            const dx2 = p[0] - q[0], dy2 = p[1] - q[1];
            if (dx2 * dx2 + dy2 * dy2 < minD2) return false;
          }
        }
        return true;
      };

      const p0 = [rng() * shape[0], rng() * shape[1]];
      points.push(p0); grid[gIdx(p0)] = 0; active.push(0);

      while (active.length) {
        const ri = active[Math.floor(rng() * active.length)];
        let found = false;
        for (let t = 0; t < tries; t++) {
          const ang = rng() * PI * 2;
          const rad = minDist + rng() * (maxDist - minDist);
          const np = [points[ri][0] + Math.cos(ang) * rad, points[ri][1] + Math.sin(ang) * rad];
          if (np[0] < 0 || np[0] >= shape[0] || np[1] < 0 || np[1] >= shape[1]) continue;
          if (far(np, minDist * minDist)) {
            points.push(np); grid[gIdx(np)] = points.length - 1;
            active.push(points.length - 1); found = true; break;
          }
        }
        if (!found) active.splice(active.indexOf(ri), 1);
      }
      return points;
    }

    // ============================================================
    // 粒子工厂
    // ============================================================
    let count, pointsData;
    let posTex, rt1, rt2, everRendered = false;
    let mesh, simMaterial, renderMaterial, simScene, simCamera;

    function createDataTexture(data) {
      const arr = new Float32Array(SIZE * SIZE * 4);
      for (let r = 0; r < count; r++) {
        arr[r * 4] = data[r * 2] * (1 / 250);
        arr[r * 4 + 1] = data[r * 2 + 1] * (1 / 250);
        arr[r * 4 + 2] = 0;
        arr[r * 4 + 3] = 0;
      }
      const tex = new THREE.DataTexture(arr, SIZE, SIZE, THREE.RGBAFormat, THREE.FloatType);
      tex.minFilter = THREE.NearestFilter;
      tex.magFilter = THREE.NearestFilter;
      tex.needsUpdate = true;
      return tex;
    }

    function createRT() {
      return new THREE.WebGLRenderTarget(SIZE, SIZE, {
        minFilter: THREE.NearestFilter,
        magFilter: THREE.NearestFilter,
        format: THREE.RGBAFormat,
        type: THREE.FloatType,
        depthBuffer: false,
        stencilBuffer: false,
      });
    }

    // Simplex 3D noise (Ashima Arts)
    const noiseGLSL = `
      vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
      vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}
      vec4 permute(vec4 x){return mod289(((x*34.)+1.)*x);}
      vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
      float snoise(vec3 v){
        const vec2 C=vec2(1./6.,1./3.); const vec4 D=vec4(0.,.5,1.,2.);
        vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
        vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.-g;
        vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
        vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+2.*C.xxx; vec3 x3=x0-D.yyy;
        i=mod289(i);
        vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
        float n_=.142857142857; vec3 ns=n_*D.wyz-D.xzx;
        vec4 j=p-49.*floor(p*ns.z*ns.z);
        vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.*x_);
        vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy;
        vec4 h=1.-abs(x)-abs(y);
        vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
        vec4 s0=floor(b0)*2.+1.; vec4 s1=floor(b1)*2.+1.; vec4 sh=-step(h,vec4(0.));
        vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
        vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
        vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
        p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
        vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.); m=m*m;
        return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
      }
    `;

    // ============================================================
    // SIM shader（官网 ring-based 噪声物理 — 对应 aI 类）
    // ============================================================
    const simFragShader = `
      precision highp float;
      uniform sampler2D uPosition, uPosRefs;
      uniform vec2 uRingPos;
      uniform float uTime, uDeltaTime;
      uniform float uRingRadius, uRingWidth, uRingWidth2, uRingDisplacement;
      ${noiseGLSL}
      void main() {
        vec2 uv = gl_FragCoord.xy / 256.0;
        vec4 pFrame = texture2D(uPosition, uv);
        float scale = pFrame.z;
        float velocity = pFrame.w;
        vec2 refPos = texture2D(uPosRefs, uv).xy;
        float time = uTime * 0.5;
        vec2 curentPos = refPos;
        vec2 pos = pFrame.xy;
        pos *= 0.8;

        float dist = distance(curentPos.xy, uRingPos);
        float noise0 = snoise(vec3(curentPos.xy * 0.2 + vec2(18.4924, 72.9744), time * 0.5));
        float dist1 = distance(curentPos.xy + (noise0 * 0.005), uRingPos);

        float t = smoothstep(uRingRadius - (uRingWidth * 2.), uRingRadius, dist) - smoothstep(uRingRadius, uRingRadius + uRingWidth, dist1);
        float t2 = smoothstep(uRingRadius - (uRingWidth2 * 2.), uRingRadius, dist) - smoothstep(uRingRadius, uRingRadius + uRingWidth2, dist1);
        float t3 = smoothstep(uRingRadius + uRingWidth2, uRingRadius, dist);

        t = pow(t, 2.);
        t2 = pow(t2, 3.);
        t += t2 * 3.;
        t += t3 * 0.4;
        t += snoise(vec3(curentPos.xy * 30. + vec2(11.4924, 12.9744), time * 0.5)) * t3 * 0.5;

        float nS = snoise(vec3(curentPos.xy * 2. + vec2(18.4924, 72.9744), time * 0.5));
        t += pow((nS + 1.5) * 0.5, 2.) * 0.6;

        float noise1 = snoise(vec3(curentPos.xy * 4. + vec2(88.494, 32.4397), time * 0.35));
        float noise2 = snoise(vec3(curentPos.xy * 4. + vec2(50.904, 120.947), time * 0.35));
        float noise3 = snoise(vec3(curentPos.xy * 20. + vec2(18.4924, 72.9744), time * 0.5));
        float noise4 = snoise(vec3(curentPos.xy * 20. + vec2(50.904, 120.947), time * 0.5));

        vec2 disp = vec2(noise1, noise2) * 0.03;
        disp += vec2(noise3, noise4) * 0.005;

        disp.x += sin((refPos.x * 20.) + (time * 4.)) * 0.02 * clamp(dist, 0., 1.);
        disp.y += cos((refPos.y * 20.) + (time * 3.)) * 0.02 * clamp(dist, 0., 1.);

        pos -= (uRingPos - (curentPos + disp)) * pow(t2, 0.75) * uRingDisplacement;

        float scaleDiff = t - scale;
        scaleDiff *= 0.2;
        scale += scaleDiff;

        vec2 finalPos = curentPos + disp + (pos * 0.25);

        velocity *= 0.5;
        velocity += scale * 0.25;

        gl_FragColor = vec4(finalPos, scale, velocity);
      }
    `;

    // ============================================================
    // RENDER shader（官网逐字复刻 — noiseColor 三色渐变 + 标准胶囊）
    // ============================================================
    const renderVertShader = `
      precision highp float;
      attribute vec4 seeds;
      uniform sampler2D uPosition;
      uniform float uTime, uParticleScale, uPixelRatio;
      uniform int uColorScheme;
      uniform float uIsHovering;
      varying vec4 vSeeds;
      varying float vVelocity, vScale;
      varying vec2 vLocalPos, vScreenPos;
      ${noiseGLSL}
      void main() {
        vec4 pos = texture2D(uPosition, uv);
        vSeeds = seeds;

        float noiseX = snoise(vec3(vec2(pos.xy * 10.), uTime * .2 + 100.));
        float noiseY = snoise(vec3(vec2(pos.xy * 10.), uTime * .2));
        float noiseX2 = snoise(vec3(vec2(pos.xy * .5), uTime * .15 + 45.));
        float noiseY2 = snoise(vec3(vec2(pos.xy * .5), uTime * .15 + 87.));

        float cDist = length(pos.xy) * 1.;
        float progress = 0.0;
        float t = smoothstep(progress - .25, progress, cDist) - smoothstep(progress, progress + .25, cDist);
        t *= smoothstep(1., .0, cDist);
        pos.xy *= 1. + (t * .02);

        float dist = smoothstep(0., 0.9, pos.w);
        dist = mix(0., dist, uIsHovering);

        pos.y += noiseY * 0.005 * dist;
        pos.x += noiseX * 0.005 * dist;
        pos.y += noiseY2 * 0.02;
        pos.x += noiseX2 * 0.02;

        vVelocity = pos.w;
        vScale = pos.z;
        vLocalPos = pos.xy;
        vec4 viewSpace = modelViewMatrix * vec4(vec3(pos.xy, 0.), 1.0);
        gl_Position = projectionMatrix * viewSpace;
        vScreenPos = gl_Position.xy;

        float minScale = .25;
        minScale += float(uColorScheme) * .75;

        gl_PointSize = ((vScale * 7.) * (uPixelRatio * 0.5) * uParticleScale) + (minScale * uPixelRatio);
      }
    `;

    const renderFragShader = `
      precision highp float;
      varying vec4 vSeeds;
      varying vec2 vScreenPos, vLocalPos;
      varying float vScale, vVelocity;
      uniform vec3 uColor1, uColor2, uColor3;
      uniform vec2 uRingPos, uRez;
      uniform float uAlpha, uTime;
      uniform int uColorScheme;
      ${noiseGLSL}
      #define PI 3.14159265359

      float sdRoundBox(vec2 p, vec2 b, vec4 r) {
        r.xy = (p.x > 0.0) ? r.xy : r.zw;
        r.x = (p.y > 0.0) ? r.x : r.y;
        vec2 q = abs(p) - b + r.x;
        return min(max(q.x, q.y), 0.0) + length(max(q, 0.0)) - r.x;
      }
      vec2 rotate(vec2 v, float a) {
        float s = sin(a), c = cos(a);
        return mat2(c, s, -s, c) * v;
      }

      void main() {
        float noiseAngle = snoise(vec3(vLocalPos * 10. + vec2(18.4924, 72.9744), uTime * .85));
        float noiseColor = snoise(vec3(vLocalPos * 2. + vec2(74.664, 91.556), uTime * .5));
        noiseColor = (noiseColor + 1.) * .5;

        float angle = atan(vLocalPos.y - uRingPos.y, vLocalPos.x - uRingPos.x);
        vec2 uv = gl_PointCoord.xy - 0.5;
        uv.y *= -1.;
        uv = rotate(uv, -angle + (noiseAngle * .5));

        // 三色渐变（官网原文）
        float h = 0.8;
        float progress = smoothstep(0., .75, pow(noiseColor, 2.));
        vec3 col = mix(mix(uColor1, uColor2, progress/h), mix(uColor2, uColor3, (progress - h)/(1.0 - h)), step(h, progress));
        vec3 color = col;

        // 标准胶囊（sdRoundBox: vec2(0.5, 0.2), vec4(.25)）
        float rounded = sdRoundBox(uv, vec2(0.5, 0.2), vec4(.25));
        rounded = smoothstep(.1, 0., rounded);

        float a = uAlpha * rounded * smoothstep(0.1, 0.2, vScale);
        if (a < 0.01) discard;

        color = clamp(color, 0., 1.);
        color = mix(color, color * clamp(vVelocity, 0., 1.), float(uColorScheme));

        gl_FragColor = vec4(color, clamp(a, 0., 1.));
      }
    `;

    // ============================================================
    // 初始化 GPU
    // ============================================================
    function initGPU() {
      posTex = createDataTexture(pointsData);
      rt1 = createRT(); rt2 = createRT();
      renderer.setRenderTarget(rt1); renderer.setClearColor(0, 0); renderer.clear();
      renderer.setRenderTarget(rt2); renderer.setClearColor(0, 0); renderer.clear();
      renderer.setRenderTarget(null);
      everRendered = false;

      // SIM scene
      simScene = new THREE.Scene();
      simCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
      simMaterial = new THREE.ShaderMaterial({
        uniforms: {
          uPosition: { value: posTex },
          uPosRefs: { value: posTex },
          uRingPos: { value: new THREE.Vector2(0, 0) },
          uTime: { value: 0 },
          uDeltaTime: { value: 0 },
          uRingRadius: { value: 0.175 },
          uRingWidth: { value: CONFIG.ringWidth },
          uRingWidth2: { value: CONFIG.ringWidth2 },
          uRingDisplacement: { value: CONFIG.ringDisplacement },
        },
        vertexShader: `void main(){ gl_Position = vec4(position, 1.0); }`,
        fragmentShader: simFragShader,
        depthTest: false,
        depthWrite: false,
      });
      simScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), simMaterial));

      // RENDER geometry
      const geom = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      const uvs = new Float32Array(count * 2);
      const seeds = new Float32Array(count * 4);
      for (let i = 0; i < count; i++) {
        const x = i % SIZE, y = Math.floor(i / SIZE);
        uvs[i * 2] = x / SIZE;
        uvs[i * 2 + 1] = y / SIZE;
        seeds[i * 4] = Math.random();
        seeds[i * 4 + 1] = Math.random();
        seeds[i * 4 + 2] = Math.random();
        seeds[i * 4 + 3] = Math.random();
      }
      geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geom.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
      geom.setAttribute('seeds', new THREE.BufferAttribute(seeds, 4));
      geom.setDrawRange(0, count);

      renderMaterial = new THREE.ShaderMaterial({
        transparent: true,
        depthTest: false,
        depthWrite: false,
        uniforms: {
          uPosition: { value: posTex },
          uTime: { value: 0 },
          uColor1: { value: new THREE.Color(CONFIG.colors[0]) },
          uColor2: { value: new THREE.Color(CONFIG.colors[1]) },
          uColor3: { value: new THREE.Color(CONFIG.colors[2]) },
          uAlpha: { value: 1 },
          uRingPos: { value: new THREE.Vector2(0, 0) },
          uIsHovering: { value: 0 },
          uRez: { value: new THREE.Vector2(card.offsetWidth, card.offsetHeight) },
          uParticleScale: { value: 1 },
          uPixelRatio: { value: renderer.getPixelRatio() },
          uColorScheme: { value: 1 },  // light theme
        },
        vertexShader: renderVertShader,
        fragmentShader: renderFragShader,
      });

      mesh = new THREE.Points(geom, renderMaterial);
      mesh.position.set(0, 0, 0);
      mesh.scale.set(5, -5, 5);
      mesh.frustumCulled = false;
      scene.add(mesh);

      document.getElementById('loading').style.display = 'none';
    }

    // ============================================================
    // 构建粒子（纯泊松盘，无形状过滤 — 官网 landing 样式）
    // ============================================================
    async function buildParticles() {
      const minD = linearMap(CONFIG.density, 0, 300, 10, 2);
      const maxD = linearMap(CONFIG.density, 0, 300, 11, 3);
      const base = poissonDiskFixed([500, 500], minD, maxD, 20);

      // 官网 landing 粒子：均匀分布在矩形区域内
      pointsData = [];
      for (const p of base) {
        pointsData.push(p[0] - 250, p[1] - 250);
      }
      count = base.length;

      document.getElementById('loading').textContent =
        `生成中… ${count} 个粒子`;

      initGPU();
    }

    // ============================================================
    // 交互：鼠标追踪
    // ============================================================
    function updateMouse(clientX, clientY) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouseNDC.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      mouseNDC.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      mouseIsOver = mouseNDC.x >= -1 && mouseNDC.x <= 1 && mouseNDC.y >= -1 && mouseNDC.y <= 1;
    }

    function checkHover() {
      if (mouseIsOver) {
        raycaster.setFromCamera(mouseNDC, camera);
        const hits = raycaster.intersectObject(raycastPlane);
        if (hits.length > 0) {
          intersectionPoint.copy(hits[0].point);
          isIntersecting = true;
        } else isIntersecting = false;
      } else isIntersecting = false;

      if (isIntersecting && !lastHoverState) {
        gsap.to(scene.userData, {
          hoverProgress: 1, duration: 0.5, ease: 'power3.out',
          onUpdate: () => { hoverProgress = scene.userData.hoverProgress; }
        });
        gsap.fromTo(scene.userData, { pushProgress: 0 }, {
          pushProgress: 1, duration: 2, delay: 0.1, ease: 'power2.out',
          onUpdate: () => { pushProgress = scene.userData.pushProgress; }
        });
      } else if (!isIntersecting && lastHoverState) {
        gsap.to(scene.userData, {
          hoverProgress: 0, duration: 0.5, ease: 'power3.out',
          onUpdate: () => { hoverProgress = scene.userData.hoverProgress; }
        });
        gsap.fromTo(scene.userData, { pushProgress: 0 }, {
          pushProgress: 1, duration: 2, delay: 0, ease: 'power2.out',
          onUpdate: () => { pushProgress = scene.userData.pushProgress; }
        });
      }
      lastHoverState = isIntersecting;
    }

    scene.userData.hoverProgress = 0;
    scene.userData.pushProgress = 0;

    // 鼠标事件绑定在卡片上
    card.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
    card.addEventListener('mouseleave', () => { mouseIsOver = false; });

    // ============================================================
    // 主循环
    // ============================================================
    let lastTime = 0;

    function animate() {
      requestAnimationFrame(animate);
      if (!mesh) return;

      const time = clock.getElapsedTime();
      const dt = time - lastTime;
      lastTime = time;

      checkHover();

      // mousePos = intersectionPoint * 0.175
      const ringPos = new THREE.Vector2(
        intersectionPoint.x * 0.175,
        intersectionPoint.y * -0.175
      );

      // ringRadius 随时间正弦变化
      const ringRadius = 0.175 + Math.sin(time * 1) * 0.03 + Math.cos(time * 3) * 0.02;

      // hover/push 交互影响 ring 参数
      const pw = pushProgress * hoverProgress;
      const ringWidthVal = CONFIG.ringWidth + pw * 0.08;
      const ringWidth2Val = CONFIG.ringWidth2 + pw * 0.04;
      const ringDispVal = CONFIG.ringDisplacement + pw * 0.06;

      // particleScale = width / pixelRatio / 2000 * particlesScale
      const particleScale = renderer.domElement.width / renderer.getPixelRatio() / 2000 * CONFIG.particlesScale;

      // --- SIM pass ---
      simMaterial.uniforms.uPosition.value = everRendered ? rt1.texture : posTex;
      simMaterial.uniforms.uRingPos.value = ringPos;
      simMaterial.uniforms.uTime.value = time;
      simMaterial.uniforms.uDeltaTime.value = dt;
      simMaterial.uniforms.uRingRadius.value = ringRadius;
      simMaterial.uniforms.uRingWidth.value = ringWidthVal;
      simMaterial.uniforms.uRingWidth2.value = ringWidth2Val;
      simMaterial.uniforms.uRingDisplacement.value = ringDispVal;

      renderer.setRenderTarget(rt2);
      renderer.render(simScene, simCamera);
      renderer.setRenderTarget(null);

      // --- RENDER pass ---
      renderMaterial.uniforms.uPosition.value = everRendered ? rt2.texture : posTex;
      renderMaterial.uniforms.uRingPos.value = ringPos;
      renderMaterial.uniforms.uTime.value = time;
      renderMaterial.uniforms.uParticleScale.value = particleScale;

      renderer.clear();
      renderer.render(scene, camera);

      // --- ping-pong ---
      [rt1, rt2] = [rt2, rt1];
      everRendered = true;
    }

    // ============================================================
    // 启动
    // ============================================================
    buildParticles().then(() => {
      animate();
      console.log(`Landing particles started · count = ${count} · particlesScale = ${CONFIG.particlesScale}`);
    });

    // ============================================================
    // resize
    // ============================================================
    addEventListener('resize', () => {
      const w = card.offsetWidth, h = card.offsetHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      if (renderMaterial) {
        renderMaterial.uniforms.uRez.value.set(w, h);
        renderMaterial.uniforms.uPixelRatio.value = renderer.getPixelRatio();
      }
    });
  </script>

  <!-- 图标波浪脚本（官网复刻：圆形灰色背景、仅上下弹跳、无水平位移） -->
  <script>
    const ICONS = [

      'developer_mode_tv','keyboard_tab','code','terminal','keyboard_return',
      'file_copy','device_hub','pen_spark','keyboard_command_key','check_circle'
    ];

    const AMPLITUDE = 35;
    const WAVELENGTH = 1484;  // 一个完整正弦波的宽度（≈ 15 个图标间距）
    const ICON_W = 106;       // 98 + 8 gap ≈ 每个图标占宽

    const list = document.getElementById('iconList');
    const bouncers = ICONS.map(name => {
      const li = document.createElement('li');
      li.innerHTML = `<div class="bouncer">${name}</div>`;
      list.appendChild(li);
      return li.querySelector('.bouncer');
    });

    // 计算每个图标在列表中的中心 x 位置
    const rects = bouncers.map(el => el.getBoundingClientRect());
    const listRect = list.getBoundingClientRect();
    const positions = rects.map(r => r.left - listRect.left + r.width / 2);

    // 官网同款：phase 从 0 → WAVELENGTH 循环，持续 7 秒
    // 驱动每个图标 Y 值：sin( (position + phase) * 2PI / WAVELENGTH ) * AMPLITUDE
    let phase = 0;
    const step = WAVELENGTH / (7 * 60); // 每帧增量（60fps 下 7 秒跑完一个波长）

    function frame() {
      phase = (phase + step) % WAVELENGTH;
      for (let i = 0; i < bouncers.length; i++) {
        const v = (positions[i] + phase) / WAVELENGTH * Math.PI * 2;
        const ty = Math.sin(v) * AMPLITUDE;
        bouncers[i].style.transform = `translateY(${ty.toFixed(2)}px)`;
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>

  <!-- ============ Morphing 卡片粒子（For developers / For organizations）============ -->
  <script type="module">
    import * as THREE from 'three';

    const SIZE = 256;
    const VIEW = 1.05;
    const POISSON_MIN_DIST = 7.33;

    // ============================================================
    // Simplex noise
    // ============================================================
    const NOISE = `
      vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
      vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}
      vec4 permute(vec4 x){return mod289(((x*34.)+1.)*x);}
      vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
      float snoise(vec3 v){
        const vec2 C=vec2(1./6.,1./3.); const vec4 D=vec4(0.,.5,1.,2.);
        vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
        vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.-g;
        vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
        vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+2.*C.xxx; vec3 x3=x0-D.yyy;
        i=mod289(i);
        vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
        float n_=.142857142857; vec3 ns=n_*D.wyz-D.xzx;
        vec4 j=p-49.*floor(p*ns.z*ns.z);
        vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.*x_);
        vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy;
        vec4 h=1.-abs(x)-abs(y);
        vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
        vec4 s0=floor(b0)*2.+1.; vec4 s1=floor(b1)*2.+1.; vec4 sh=-step(h,vec4(0.));
        vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
        vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
        vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
        p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
        vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.); m=m*m;
        return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
      }
    `;

    // ============================================================
    // 加载 PNG 图片 → ImageData (500x500, 白底黑色形状)
    // ============================================================
    function loadShapeImageData(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          // 先缩放到 500x500，保持线条清晰
          const cvs = document.createElement('canvas');
          cvs.width = 500; cvs.height = 500;
          const ctx = cvs.getContext('2d');
          ctx.drawImage(img, 0, 0, 500, 500);
          resolve(ctx.getImageData(0, 0, 500, 500));
        };
        img.onerror = () => {
          // fallback: 纯白图片（无形状，保持散乱）
          const cvs = document.createElement('canvas');
          cvs.width = 500; cvs.height = 500;
          const ctx = cvs.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, 500, 500);
          resolve(ctx.getImageData(0, 0, 500, 500));
        };
        img.src = url;
      });
    }

    // ============================================================
    // 距离函数 — 暗像素（形状画笔）返回小值
    // ============================================================
    function distFn(point, imgData) {
      const w = imgData.width, h = imgData.height;
      const xi = Math.min(w - 1, Math.max(0, Math.round(point[0])));
      const yi = Math.min(h - 1, Math.max(0, Math.round(point[1])));
      const p = imgData.data[(xi + yi * w) * 4] / 255;
      return p * p * p;
    }

    // 只在形状区域撒 Poisson-disk 点
    function poissonOnShape(imgData, maxTries) {
      const pts = [];
      const minD2 = POISSON_MIN_DIST * POISSON_MIN_DIST;
      let g = 0;
      while (g < maxTries) {
        g++;
        const x = Math.random() * 500, y = Math.random() * 500;
        if (distFn([x, y], imgData) > 0.15) continue;
        let ok = true;
        for (const p of pts) {
          const dx = p[0] - x, dy = p[1] - y;
          if (dx * dx + dy * dy < minD2) { ok = false; break; }
        }
        if (ok) pts.push([x, y]);
      }
      return pts;
    }

    // ============================================================
    // 初始化一张 morphing 卡片
    // ============================================================
    async function initMorphCard(canvasId, imgData, opts = {}) {
      const canvas = document.getElementById(canvasId);
      const card = canvas.parentElement;
      const W = card.offsetWidth, H = card.offsetHeight;
      canvas.width = W; canvas.height = H;

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(W, H, false);
      renderer.setClearColor(0x121212, 1);

      const aspect = W / H;
      const camera = new THREE.OrthographicCamera(-VIEW * aspect, VIEW * aspect, VIEW, -VIEW, 0, 10);
      camera.position.z = 5;
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x121212);
      const clock = new THREE.Clock();

      // 散乱粒子（全屏 Poisson）
      const ptsBase = [];
      { const m2 = POISSON_MIN_DIST * POISSON_MIN_DIST; let g = 0;
        while (g < 40000) { g++;
          const x = Math.random() * 500, y = Math.random() * 500;
          let ok = true;
          for (const p of ptsBase) { const dx = p[0] - x, dy = p[1] - y; if (dx * dx + dy * dy < m2) { ok = false; break; } }
          if (ok) ptsBase.push([x, y]);
        }
      }

      // 形状目标点
      const shapePts = poissonOnShape(imgData, 80000);
      const scl = opts.scale || 1.3;
      const yOff = opts.yOffset || 0.1;

      const nearest = new Float32Array(ptsBase.length * 2);
      for (let i = 0; i < ptsBase.length; i++) {
        let best = shapePts[0], bestD = Infinity;
        for (const p of shapePts) {
          if (Math.random() < 0.75) continue;
          const d = (p[0] - ptsBase[i][0]) ** 2 + (p[1] - ptsBase[i][1]) ** 2;
          if (d < bestD) { bestD = d; best = p; }
        }
        nearest[i * 2] = ((best[0] - 250) / 250) * scl;
        nearest[i * 2 + 1] = ((250 - best[1]) / 250) * scl + yOff;
      }

      const count = ptsBase.length;
      const base = new Float32Array(count * 2);
      for (let i = 0; i < count; i++) {
        base[i * 2] = (ptsBase[i][0] - 250) / 250;
        base[i * 2 + 1] = (250 - ptsBase[i][1]) / 250;

      // GPGPU 纹理
      function mkTex(data, fillLen) {
        const arr = new Float32Array(SIZE * SIZE * 4);
        for (let i = 0; i < fillLen; i++) arr[i] = data[i];

      for (let i = 0; i < count; i++) { rawPos[i * 4] = base[i * 2]; rawPos[i * 4 + 1] = base[i * 2 + 1]; }
      const rawRef = new Float32Array(SIZE * SIZE * 4);
      for (let i = 0; i < count; i++) { rawRef[i * 4] = base[i * 2]; rawRef[i * 4 + 1] = base[i * 2 + 1]; }
      const rawNear = new Float32Array(SIZE * SIZE * 4);

        precision highp float;

          vec2 p=pf.xy, tg=mix(rp,np,uIsHovering*uIsHovering), dr=normalize(tg-p)*.01;

        }
      `;
      const simMat = new THREE.ShaderMaterial({
        uniforms: { uPosition:{value:posTex}, uPosRefs:{value:refTex}, uPosNearest:{value:nearTex},
          uTime:{value:0}, uDeltaTime:{value:0}, uIsHovering:{value:0} },
        vertexShader:'void main(){gl_Position=vec4(position,1.0);}',
        fragmentShader:simFrag, depthTest:false, depthWrite:false,
      });
      const simScene = new THREE.Scene();
      simScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), simMat));
      const simCam = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

      // RENDER
      const uvs = new Float32Array(count * 2);
      const seeds = new Float32Array(count * 4);
      for (let i = 0; i < count; i++) {
        const x = i % SIZE, y = Math.floor(i / SIZE);
        uvs[i*2] = x / SIZE; uvs[i*2+1] = y / SIZE;

      }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(count*3), 3));
      geom.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
      geom.setAttribute('seeds', new THREE.BufferAttribute(seeds, 4));

      const c1 = opts.color1 || '#318bf7', c2 = opts.color2 || '#bada4c', c3 = opts.color3 || '#e35058';

      const rdrVert = `
        precision highp float;
        attribute vec4 seeds;

        uniform float uTime, uParticleScale, uPixelRatio, uIsHovering, uPulseProgress;

      const rdrFrag = `
        precision highp float;
        varying vec4 vSeeds; varying vec2 vScreenPos, vLocalPos; varying float vScale, vVelocity;
        uniform vec3 uColor1,uColor2,uColor3; uniform vec2 uRez; uniform float uAlpha,uTime; uniform int uColorScheme;
        ${NOISE}
        void main(){
          vec2 uv=gl_PointCoord.xy-.5; uv.y*=-1.;
          float h=.8, pr=vVelocity;
          vec3 col=mix(mix(uColor1,uColor2,pr/h),mix(uColor2,uColor3,(pr-h)/(1.-h)),step(h,pr));
          float disc=smoothstep(.5,.45,length(uv)), a=uAlpha*disc*smoothstep(.1,.2,vScale);
          if(a<.01)discard; col=clamp(col,0.,1.);
          col=mix(col,col*clamp(vVelocity,0.,1.),float(uColorScheme));
          gl_FragColor=vec4(col,clamp(a,0.,1.));
        }
      `;

      const rdrMat = new THREE.ShaderMaterial({
        uniforms: {
          uPosition:{value:posTex}, uTime:{value:0}, uParticleScale:{value:W/2000},
          uPixelRatio:{value:Math.min(devicePixelRatio,2)}, uRez:{value:new THREE.Vector2(W,H)},
          uAlpha:{value:1}, uIsHovering:{value:0}, uPulseProgress:{value:0}, uColorScheme:{value:0},
          uColor1:{value:new THREE.Color(c1)}, uColor2:{value:new THREE.Color(c2)}, uColor3:{value:new THREE.Color(c3)},
        },
        vertexShader:rdrVert, fragmentShader:rdrFrag, transparent:true, depthTest:false, depthWrite:false,
      });
      const mesh = new THREE.Points(geom, rdrMat);
      mesh.frustumCulled = false;
      scene.add(mesh);

      // hover
      let hp = 0;
      card.addEventListener('mouseenter', () => { gsap.to({v:hp}, {v:1, duration:1.6, ease:'power2.out', onUpdate(){hp=this.targets()[0].v;}}); });
      card.addEventListener('mouseleave', () => { gsap.to({v:hp}, {v:0, duration:1.2, ease:'power3.out', onUpdate(){hp=this.targets()[0].v;}}); });

      // animate
      function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta(), t = clock.getElapsedTime();
        simMat.uniforms.uTime.value = t;
        simMat.uniforms.uDeltaTime.value = dt;
        simMat.uniforms.uIsHovering.value = hp;
        simMat.uniforms.uPosition.value = everRendered ? rt1.texture : posTex;
        renderer.setRenderTarget(rt2);
        renderer.render(simScene, simCam);
        renderer.setRenderTarget(null);
        [rt1, rt2] = [rt2, rt1];
        everRendered = true;
        rdrMat.uniforms.uPosition.value = rt1.texture;
        rdrMat.uniforms.uTime.value = t;
        rdrMat.uniforms.uIsHovering.value = hp;
        rdrMat.uniforms.uPulseProgress.value = (Math.sin(t * 0.6) + 1) * 0.5;
        renderer.render(scene, camera);
      }

      addEventListener('resize', () => {
        const nw = card.offsetWidth, nh = card.offsetHeight;
        renderer.setSize(nw, nh, false);
        const na = nw / nh;
        camera.left = -VIEW * na; camera.right = VIEW * na;
        camera.top = VIEW; camera.bottom = -VIEW;
        camera.updateProjectionMatrix();
        if (rdrMat) { rdrMat.uniforms.uRez.value.set(nw, nh); rdrMat.uniforms.uParticleScale.value = nw / 2000; }
      });

      animate();
    }

    // ============================================================
    // 启动 — 加载 PNG 图片作为形状
    // ============================================================
    Promise.all([
      loadShapeImageData('individual.png'),
      loadShapeImageData('cube.png'),
    ]).then(([individualData, cubeData]) => {
      initMorphCard('mc1', individualData, {
        color1: '#318bf7', color2: '#bada4c', color3: '#e35058', scale: 1.3, yOffset: 0.1,
      });
      initMorphCard('mc2', cubeData, {
        color1: '#aecbfa', color2: '#aecbfa', color3: '#93bbfc', scale: 1.2, yOffset: 0.05,
      });
    });
  </script>
</body>
</html>
