<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Antigravity icon sine wave — 复刻</title>

<!-- 官网用的就是 Google Material Symbols Outlined 字体，靠 ligature 名渲染图标 -->
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: #0b0c0f;
    color: #e6e8eb;
    font: 14px/1.5 system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  h1 { font-weight: 400; letter-spacing: .02em; opacity: .8; margin: 0 0 40px; }

  /* 外层裁剪窗口：只显示一屏宽度的波形 */
  .wave-window {
    position: relative;
    width: 100%; max-width: 1440px;
    height: 160px;            /* 振幅 35*2 + 图标高度余量 */
    overflow: hidden;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
            mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
  }

  /* 内层 ul：宽度远大于屏幕，整体被 transform: translateX 平移 */
  .icon-list {
    display: flex; gap: 0;
    list-style: none; margin: 0; padding: 0;
    will-change: transform;
    /* JS 会设置 transform: translateX(...) */
  }

  .grid-col {
    width: 98px; height: 98px;
    flex: 0 0 auto;
    display: grid; place-items: center;
    will-change: transform;
    /* JS 会设置 transform: translateY( sin(...) ) */
  }

  .symbol {
    font-family: 'Material Symbols Outlined';
    font-size: 48px;
    line-height: 1;
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    color: #c9ced6;
    user-select: none;
    /* ligature: 直接写图标名即可渲染 */
  }

  .hint { margin-top: 32px; opacity: .5; font-size: 13px; max-width: 640px; text-align: center; }
</style>
</head>
<body>

<h1>Material Symbols · 正弦波形滚动</h1>

<div class="wave-window">
  <ul class="icon-list" id="list"></ul>
</div>

<p class="hint">
  每个图标的 Y = 振幅 · sin(2π · (基准x + 整体偏移) / 波长)。<br>
  整体偏移随时间递增 → 波形看似固定在屏幕上、图标从右向左流过。<br>
  （官网是把“整体偏移”绑到页面滚动进度，这里改成时间驱动方便观察。）
</p>

<script>
  // ---- 参数（取自官网实测）----
  const ICON_W       = 98;     // 每个 <li> 宽度 px
  const AMPLITUDE    = 35;     // 振幅 px（实测 ±35）
  const WAVELENGTH   = 1484;   // 波长 px ≈ 15 个图标宽 ≈ 一屏宽
  const SPEED        = 70;     // 波形左移速度 px/s（官网由滚动驱动，这里用时间）
  const ICONS = [
    'plus_code','deployed_code','spark','search_spark','data_object','refresh',
    'code_blocks','dashboard_customize','commit','spark','folder','merge',
    'developer_mode_tv','keyboard_tab','code','terminal','keyboard_return',
    'file_copy','device_hub','pen_spark','keyboard_command_key','check_circle'
  ];

  // 为了无缝循环，把图标序列复制两份拼接；总宽 = N * ICON_W * 2
  const SEQ = [...ICONS, ...ICONS];
  const list = document.getElementById('list');
  const items = SEQ.map(name => {
    const li = document.createElement('li');
    li.className = 'grid-col';
    li.innerHTML = `<span class="symbol">${name}</span>`;
    list.appendChild(li);
    return li;
  });
  const TOTAL_W = SEQ.length * ICON_W;   // 一份完整循环的宽度
  const HALF_W  = ICONS.length * ICON_W; // 单份宽度（达到它就回绕）

  // ---- 动画 ----
  let offset = 0;          // 当前整体偏移（向左为正）
  let last = performance.now();

  function frame(now) {
    const dt = (now - last) / 1000;
    last = now;
    offset = (offset + SPEED * dt) % HALF_W;   // 越过单份宽度就回绕 → 无缝

    // 1) 整个 ul 向左平移
    list.style.transform = `translateX(${-offset}px)`;

    // 2) 每个图标按“当前屏幕 x”计算 Y，使波形固定在屏幕空间
    for (let i = 0; i < items.length; i++) {
      // 图标基准 x（未平移时）减去 offset = 此刻在屏幕上的 x
      const screenX = i * ICON_W - offset;
      const ty = AMPLITUDE * Math.sin(2 * Math.PI * screenX / WAVELENGTH);
      items[i].style.transform = `translateY(${ty.toFixed(2)}px)`;
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
</script>
</body>
</html>
